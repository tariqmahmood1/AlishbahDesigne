{% load static %}
<html>
<head>
    {% block Title %}
    <title>Alishba Designs</title>
    {% endblock Title %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- 🔷 Logo -->
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="/media/designs/logo.png" alt="Logo" width="140" height="40" class="me-2">
            Alishba Designs
        </a>

        <!-- ☰ Mobile Button (Hamburger) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- 🔗 Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/about/' %}active{% endif %}" href="/about/">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/portfolio/' %}active{% endif %}" href="/portfolio/">Portfolio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/services/' %}active{% endif %}" href="/services/">Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/contact/' %}active{% endif %}" href="/contact/">Contact</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/shop/' %}active{% endif %}" href="{% url 'shop' %}">
                        Shop
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/shop/cart/' %}active{% endif %}" href="{% url 'cart' %}">
                        Cart 🛒
                    </a>
                </li>
                
            </ul>

        </div>
    </div>
</nav>


<hr>

{% block content %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
