{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    {% if about %}

    <!-- 🔥 TOP SECTION -->
    <div class="row align-items-center">

        <!-- Image -->
        <div class="col-md-6">
            {% if about.image %}
            <img src="{{ about.image.url }}" class="img-fluid rounded shadow">
            {% endif %}
        </div>

        <!-- Text -->
        <div class="col-md-6">
            <h1 class="mb-3">{{ about.title }}</h1>
            <p>{{ about.descriptions }}</p>
        </div>

    </div>

    <!-- 💎 VISION & EXPERIENCE -->
    <div class="row mt-5 text-center">

        <div class="col-md-6 d-flex">
            <div class="p-4 shadow rounded bg-light w-100 d-flex flex-column">
                <h3>Our Vision</h3>
                <p class="flex-grow-1">{{ about.vision }}</p>
            </div>
        </div>

        <div class="col-md-6 d-flex">
            <div class="p-4 shadow rounded bg-light w-100 d-flex flex-column">
                <h3>Experience</h3>
                <p class="flex-grow-1">{{ about.Experience }}</p>
            </div>
        </div>

    </div>

    {% else %}
        <p class="text-center text-danger">No About Data Found</p>
    {% endif %}

</div>

{% endblock %}
